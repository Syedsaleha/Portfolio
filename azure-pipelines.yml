trigger:
- main

pool:
  name: 'selfhostedpool'

variables:
- group: 'cloudflare-vars'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
  displayName: 'Install dependencies and Build'
  workingDirectory: $(System.DefaultWorkingDirectory)

- script: |
    dir dist
    npx wrangler pages deploy dist --project-name=syed-portfolio --branch=main
  displayName: 'Deploy to Cloudflare Pages'
  workingDirectory: $(System.DefaultWorkingDirectory)
  env:
    CLOUDFLARE_API_TOKEN: $(CF_PAGES_TOKEN)
    CLOUDFLARE_ACCOUNT_ID: $(CF_ACCOUNT_ID)