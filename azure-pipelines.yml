trigger:
- main

pool:
  name: 'selfhostedpool'

variables:
- group: 'cloudflare-vars'

steps:
- checkout: self
  clean: true

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npx vite build
  displayName: 'Force Vite Build'
  workingDirectory: $(System.DefaultWorkingDirectory)

- script: |
    dir
    if exist dist (
      echo "Dist folder found! Proceeding..."
      npx wrangler pages deploy dist --project-name=syed-portfolio --branch=main
    ) else (
      echo "Dist folder STILL missing. Checking for build errors..."
      exit 1
    )
  displayName: 'Deploy to Cloudflare Pages'
  workingDirectory: $(System.DefaultWorkingDirectory)
  env:
    CLOUDFLARE_API_TOKEN: $(CF_PAGES_TOKEN)
    CLOUDFLARE_ACCOUNT_ID: $(CF_ACCOUNT_ID)